services:
  scoring:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4100
      SCORING_FRONTEND_DIST: /app/frontend/dist
      SCORING_ANALYSIS_API_BASE_URL: http://scoring-analysis:4200
      SCORING_DATA_FILE: /data/scoring/coding-records.json
      SCORING_ANALYSIS_JOBS_FILE: /data/scoring/analysis-jobs.json
      SCORING_STORAGE_ROOT: /data/scoring/storage/projects
      SCORING_MVP_ROOT: /data/scoring/mvp
      SCORING_LOCAL_ANALYSIS_WORKSPACE_ROOT: /data/scoring/tmp/analysis-jobs
      SCORING_ENABLE_LOCAL_ANALYSIS_ADAPTER: "0"
    volumes:
      - scoring-data:/data/scoring
    depends_on:
      scoring-analysis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4100/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    expose:
      - "4100"

  scoring-analysis:
    build:
      context: ./artifacts/scoring-analysis
      dockerfile: Dockerfile
    environment:
      SCORING_ANALYSIS_HOST: 0.0.0.0
      SCORING_ANALYSIS_PORT: 4200
    volumes:
      - scoring-data:/data/scoring:ro
      - scoring-analysis-runs:/app/runs
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4200/api/health', timeout=3).read()\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    expose:
      - "4200"

volumes:
  scoring-data:
  scoring-analysis-runs:
