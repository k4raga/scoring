services:
  scoring:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4100
      SCORING_FRONTEND_DIST: /app/frontend/dist
      SCORING_EXTRACTOR_API_BASE_URL: http://scoring-extractor:4200
      SCORING_ANALYSIS_API_BASE_URL: http://scoring-extractor:4200
      SCORING_DATA_FILE: /data/scoring/coding-records.json
      SCORING_ANALYSIS_JOBS_FILE: /data/scoring/analysis-jobs.json
      SCORING_STORAGE_ROOT: /data/scoring/storage/projects
      SCORING_MVP_ROOT: /data/scoring/mvp
      SCORING_LOCAL_ANALYSIS_WORKSPACE_ROOT: /data/scoring/tmp/analysis-jobs
      SCORING_EXTRACTOR_RUNS_ROOT: /app/extractor-runs
      SCORING_ENABLE_LOCAL_ANALYSIS_ADAPTER: "0"
      SCORING_DIFY_API_BASE_URL: ${SCORING_DIFY_API_BASE_URL:-}
      SCORING_DIFY_API_KEY: ${SCORING_DIFY_API_KEY:-}
      SCORING_DIFY_API_PATH: ${SCORING_DIFY_API_PATH:-/workflows/run}
      SCORING_DIFY_PAYLOAD_INPUT_KEY: ${SCORING_DIFY_PAYLOAD_INPUT_KEY:-scoring_payload}
      SCORING_DIFY_RESPONSE_MODE: ${SCORING_DIFY_RESPONSE_MODE:-blocking}
      SCORING_DIFY_TIMEOUT_MS: ${SCORING_DIFY_TIMEOUT_MS:-95000}
      SCORING_DIFY_MAX_DOCUMENTS: ${SCORING_DIFY_MAX_DOCUMENTS:-40}
      SCORING_DIFY_MAX_DOCUMENT_CHARS: ${SCORING_DIFY_MAX_DOCUMENT_CHARS:-120000}
      SCORING_DIFY_MAX_JSON_ARTIFACT_CHARS: ${SCORING_DIFY_MAX_JSON_ARTIFACT_CHARS:-80000}
      SCORING_DIFY_MAX_PAYLOAD_CHARS: ${SCORING_DIFY_MAX_PAYLOAD_CHARS:-650000}
    volumes:
      - scoring-data:/data/scoring
      - scoring-extractor-runs:/app/extractor-runs:ro
    depends_on:
      scoring-extractor:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4100/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    expose:
      - "4100"

  scoring-extractor:
    build:
      context: ./artifacts/scoring-extractor
      dockerfile: Dockerfile
    environment:
      SCORING_EXTRACTOR_HOST: 0.0.0.0
      SCORING_EXTRACTOR_PORT: 4200
      SCORING_ANALYSIS_HOST: 0.0.0.0
      SCORING_ANALYSIS_PORT: 4200
    volumes:
      - scoring-data:/data/scoring:ro
      - scoring-extractor-runs:/app/runs
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4200/api/health', timeout=3).read()\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    expose:
      - "4200"

volumes:
  scoring-data:
  scoring-extractor-runs:
